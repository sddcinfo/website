name = "sddc-info-website"
compatibility_date = "2026-03-17"
compatibility_flags = ["nodejs_compat"]

# Custom domains (managed by Cloudflare, auto DNS + SSL)
routes = [
  { pattern = "sddc.info", custom_domain = true },
  { pattern = "www.sddc.info", custom_domain = true }
]

# Environment variables (non-secret only — secrets via `wrangler secret put`)
[vars]
CONTACT_EMAIL = "bradlay@gmail.com"
# TURNSTILE_SECRET_KEY — set via: npx wrangler secret put TURNSTILE_SECRET_KEY

# Email service binding for contact form
[[send_email]]
name = "EMAIL"
